# HTTP конфигурация (порт 80) — нужна для получения и обновления сертификата
server {
    listen 80;
    server_name stankinapp.ru;

    # Обработка запросов Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Проксирование на ваш API
    location /api {
        proxy_pass http://api:5000;
        include proxy_params;

        # CORS ЗАГОЛОВКИ
        add_header 'Access-Control-Allow-Origin' 'http://stankinapp.ru' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Обработка preflight запросов (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://stankinapp.ru' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Статические файлы фронтенда
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

