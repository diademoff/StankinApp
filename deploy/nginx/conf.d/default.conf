# HTTP конфигурация (порт 80) — нужна для получения и обновления сертификата
server {
    listen 80;
    server_name stankinapp.ru;

    add_header 'Access-Control-Allow-Origin' 'https://stankinapp.ru' always;

    # Обработка запросов Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Проксирование на ваш API
    location /api {
        proxy_pass http://api:5000;
        include proxy_params;
    }

    # Статические файлы фронтенда
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS конфигурация (порт 443) — после получения сертификата
server {
    listen 443 ssl;
    server_name stankinapp.ru;

    ssl_certificate /etc/letsencrypt/live/stankinapp.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stankinapp.ru/privkey.pem;

    # Рекомендуемые SSL-настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

    # Проксирование на API
    location /api {
        proxy_pass http://api:5000;
        include proxy_params;
        add_header 'Access-Control-Allow-Origin' 'https://stankinapp.ru' always;
    }

    # Статические файлы фронтенда
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}