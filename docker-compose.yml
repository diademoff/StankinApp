services:
  api:
    build:
      context: .
      dockerfile: StankinAppDatabase/StankinAppApi/Dockerfile
    image: stankinapi:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - Database__Path=/app/data/schedule.db  # Путь к БД внутри контейнера (override, если нужно)
    volumes:
      - ./data:/app/data  # Bind-mount для persistent БД (на хосте: ./db-data/schedule.db)
    restart: unless-stopped
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    image: stankin-web:latest
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    command: >
      sh -c "nginx -g 'daemon off;' &
             while true; do
                 sleep 6h;
                 nginx -s reload;
             done"
