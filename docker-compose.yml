services:
  api:
    build:
      context: .
      dockerfile: StankinAppDatabase/StankinAppApi/Dockerfile
    image: stankinapi:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      # Подстройте connection string под ваш код
      - ConnectionStrings__Default=Data Source=/data/stankin.db
    volumes:
      - ./data/schedule.db:/data/schedule.db
    expose:
      - "5000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    image: stankin-web:latest
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    command: >
      sh -c "nginx -g 'daemon off;' &
             while :; do
                 sleep 6h;
                 nginx -s reload;
             done"
