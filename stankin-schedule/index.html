<!DOCTYPE html>
<html lang="ru" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Расписание</title>
  <meta name="theme-color" content="#4A90E2" />
  <link rel="apple-touch-icon" href="apple-touch-icon.jpg" />
  <link rel="apple-touch-icon-precomposed" href="apple-touch-icon.jpg" />
  <script type="module" src="/src/main.ts"></script>
</head>

<body class="h-full flex flex-col bg-gray-100 text-gray-800" x-data="scheduleApp" x-init="init()">
  <!-- Yandex.Metrika counter -->
  <script type="text/javascript">
    (function (m, e, t, r, i, k, a) {
      m[i] = m[i] || function () { (m[i].a = m[i].a || []).push(arguments) };
      m[i].l = 1 * new Date();
      for (var j = 0; j < document.scripts.length; j++) { if (document.scripts[j].src === r) { return; } }
      k = e.createElement(t), a = e.getElementsByTagName(t)[0], k.async = 1, k.src = r, a.parentNode.insertBefore(k, a)
    })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js?id=103946021', 'ym');
    ym(103946021, 'init', { ssr: true, webvisor: true, clickmap: true, ecommerce: "dataLayer", accurateTrackBounce: true, trackLinks: true });
  </script>
  <noscript>
    <div><img src="https://mc.yandex.ru/watch/103946021" style="position:absolute; left:-9999px;" alt="" /></div>
  </noscript>
  <!-- /Yandex.Metrika counter -->
  <div class="flex-1 min-h-0 flex flex-col max-w-xl mx-auto w-full py-10 px-4">
    <!-- Выбор группы -->
    <template x-if="!selectedGroup">
      <div x-data="{
        selectedYear: null,
        selectedAbbr: null,
        get groupedGroups() {
            const result = {};
            const groups = this.groups || [];
            for (const g of groups) {
                const match = g.match(/-(\d{2})-/);
                if (!match) continue;
                const key = match[1];
                if (!result[key]) result[key] = [];
                result[key].push(g);
            }
            return result;
        },
        get years() {
            return Object.keys(this.groupedGroups).sort((a, b) => parseInt(b) - parseInt(a));
        },
        get abbrevs() {
            if (!this.selectedYear) return [];
            const groupsInYear = this.groupedGroups[this.selectedYear] || [];
            const abbrSet = new Set(groupsInYear.map(g => g.split('-')[0]));
            return Array.from(abbrSet).sort();
        },
        get filteredGroups() {
            if (!this.selectedYear || !this.selectedAbbr) return [];
            const prefix = `${this.selectedAbbr}-${this.selectedYear}-`;
            return (this.groupedGroups[this.selectedYear] || [])
                .filter(g => g.startsWith(prefix))
                .sort();
        }
    }" class="flex flex-col min-h-0 flex-1">
        <h1 class="text-2xl font-bold mb-4">Выберите группу</h1>

        <template x-if="!groups || groups.length === 0">
          <p>Загрузка групп...</p>
        </template>

        <template x-if="groups && groups.length > 0">
          <div class="flex flex-col min-h-0 flex-1">
            <!-- Шаг 1: Год -->
            <template x-if="!selectedYear">
              <div class="flex-1">
                <h2 class="text-xl font-semibold mb-2">Выберите год поступления</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                  <template x-for="year in years" :key="year">
                    <button @click="selectedYear = year"
                      class="bg-white shadow hover:shadow-lg rounded-xl p-4 text-center text-sm font-medium transition-all duration-150 hover:bg-blue-50 active:scale-95">
                      <span x-text="`20${year}г`"></span>
                    </button>
                  </template>
                </div>
              </div>
            </template>

            <!-- Шаг 2: Аббревиатура -->
            <template x-if="selectedYear && !selectedAbbr">
              <div class="flex-1">
                <div class="flex items-center mb-4">
                  <button @click="selectedYear = null" class="text-blue-500 hover:underline mr-2">&lt; Назад</button>
                  <h2 class="text-xl font-semibold">Выберите аббревиатуру для 20<span x-text="selectedYear"></span>г
                  </h2>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                  <template x-for="abbr in abbrevs" :key="abbr">
                    <button @click="selectedAbbr = abbr"
                      class="bg-white shadow hover:shadow-lg rounded-xl p-4 text-center text-sm font-medium transition-all duration-150 hover:bg-blue-50 active:scale-95">
                      <span x-text="abbr"></span>
                    </button>
                  </template>
                </div>
              </div>
            </template>

            <!-- Шаг 3: Конкретная группа -->
            <template x-if="selectedYear && selectedAbbr">
              <div class="flex-1">
                <div class="flex items-center mb-4">
                  <button @click="selectedAbbr = null" class="text-blue-500 hover:underline mr-2">&lt; Назад</button>
                  <h2 class="text-xl font-semibold">
                    Выберите группу для <span x-text="selectedAbbr"></span> в 20<span x-text="selectedYear"></span>г
                  </h2>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                  <template x-for="group in filteredGroups" :key="group">
                    <button @click="selectGroup(group)"
                      class="bg-white shadow hover:shadow-lg rounded-xl p-4 text-center text-sm font-medium transition-all duration-150 hover:bg-blue-50 active:scale-95">
                      <span x-text="group"></span>
                    </button>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

    <!-- Расписание -->
    <template x-if="selectedGroup">
      <div class="flex flex-col min-h-0 flex-1">
        <h1 class="text-xl font-semibold mb-2">
          <button class="mb-4" @click="reset()">✎</button>
          <span x-text="selectedGroup"></span>
        </h1>
        <div x-data="scheduleComponent(selectedGroup)" x-init="init()" class="flex flex-col min-h-0 flex-1">
          <!-- Swiper с датами -->
          <div class="flex items-center justify-between mb-4">
            <div class="swiper w-full" x-ref="swiper">
              <div class="swiper-wrapper">
                <template x-for="(range, index) in dateRanges" :key="index">
                  <div class="swiper-slide">
                    <div class="flex justify-center gap-2 md:gap-3 px-2">
                      <template x-for="date in range" :key="date">
                        <button @click="onDateClick(date)"
                          class="inline-flex select-none items-center justify-center w-12 h-10 px-1 py-2 md:w-14 md:h-12 rounded-xl border border-slate-200 bg-white text-slate-700 text-sm md:text-base font-medium shadow-sm transition-transform duration-150 hover:bg-slate-50 hover:border-slate-300 active:scale-[0.98] focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 disabled:opacity-45 disabled:cursor-not-allowed"
                          :class="isSelectedDate(date) ? 'bg-blue-50 border-blue-300 text-blue-700 shadow ring-1 ring-inset ring-blue-300' : ''"
                          :disabled="!hasSchedule(date) && loading">
                          <span class="tabular-nums font-mono tracking-tight" x-text="formatDateShort(date)"></span>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Контент расписания -->
          <div x-ref="scheduleContainer" class="flex-1 min-h-0 overflow-y-auto">
            <div x-show="loading && loadingDir === 'top'" class="text-gray-600 text-center py-2">Загрузка расписания...
            </div>
            <div x-ref="loadMoreTop"></div>

            <template x-if="!loading && isEmptySchedule && !error">
              <p class="text-center">⏳ Загрузка...</p>
            </template>
            <template x-if="error">
              <p class="text-red-500 text-center" x-text="error"></p>
            </template>

            <template x-for="entry in Object.entries(groupedSchedule)" :key="entry[0]">
              <div :id="'date-' + entry[0]" class="mb-6">
                <h2 class="text-lg font-semibold mb-2 text-center" x-text="formatDate(entry[0])"></h2>
                <div class="space-y-4">
                  <template x-if="entry[1].length === 0">
                    <div class="text-gray-600 text-center py-2">Пар нет</div>
                  </template>
                  <template x-for="lesson in entry[1]" :key="lessonKey(entry[0], lesson)">
                    <div @click="openDiscussionModal(lesson)"
                      class="group relative rounded-2xl bg-white shadow-sm ring-1 ring-gray-200 p-4 hover:shadow-md focus-within:ring-2 focus-within:ring-blue-400 transition"
                      :aria-label="`Занятие: ${lesson.subject}`">
                      <!-- Предмет + время -->
                      <div class="flex items-start justify-between gap-3">
                        <h3 class="text-lg sm:text-xl font-semibold tracking-tight leading-snug"
                          x-text="lesson.subject"></h3>
                        <div class="shrink-0 text-right">
                          <div class="text-sm font-mono tabular-nums"
                            x-text="`🕖 ${formatTime(lesson.startTime)}–${formatTime(calculateEndTime(lesson.startTime, lesson.duration))}`">
                          </div>
                        </div>
                      </div>

                      <!-- Тип + кабинет + порядковый номер -->
                      <div class="mt-2 flex flex-wrap items-center gap-2 text-sm">
                        <span
                          class="inline-block rounded-md bg-gray-50 ring-1 ring-gray-200 px-2 py-1 text-sm font-medium"
                          x-text="formatCabinet(lesson.cabinet)"></span>
                        <span class="inline-flex items-center rounded-full px-2 py-1 ring-1 font-medium"
                          :class="typeBadgeClass(lesson.type)" x-text="lesson.type"></span>
                        <span class="text-gray-600"
                          x-text="formatSequence(lesson.sequencePosition, lesson.sequenceLength, lesson.type)"></span>
                      </div>

                      <!-- Подгруппа -->
                      <div class="mt-2">
                        <template x-if="lesson.subgroup">
                          <span class="text-gray-500">· Подгруппа: <span x-text="lesson.subgroup"></span></span>
                        </template>
                      </div>

                      <!-- Преподаватель -->
                      <div class="mt-2 text-sm text-gray-800 flex items-center justify-between">
                        <span x-text="'🎓 ' + (lesson.teacher || 'Не указан')"></span>
                        <template x-if="lesson.teacher">
                          <div class="flex items-center text-xs bg-gray-100 rounded-full px-2 py-1">
                            <span class="text-yellow-500 mr-1">⭐</span>
                            <span class="font-semibold" x-text="getTeacherRating(lesson.teacher).avg"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <div x-ref="loadMoreBottom"></div>
            <div x-show="loading && loadingDir === 'bottom'" class="text-gray-600 text-center py-2">⏳ Загрузка...</div>

            <template x-if="isDiscussionModalOpen">
              <div @click="closeDiscussionModal()"
                class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[100] overflow-y-auto">
                <div @click.stop class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-md space-y-4">
                  <div class="text-center">
                    <h2 class="text-xl font-bold" x-text="selectedLessonForModal?.teacher || 'Преподаватель не указан'">
                    </h2>
                    <div class="flex items-center justify-center text-lg mt-1">
                      <span class="text-yellow-500 mr-1">⭐</span>
                      <span class="font-bold" x-text="getTeacherRating(selectedLessonForModal?.teacher).avg"></span>
                      <span class="text-gray-500 text-sm ml-2"
                        x-text="`(${getTeacherRating(selectedLessonForModal?.teacher).count || 0} оценок)`"></span>
                    </div>
                  </div>

                  <div>
                    <h3 class="font-semibold mb-2">🔥 Популярные мнения:</h3>
                    <div class="space-y-3">
                      <template x-for="comment in getTopComments(selectedLessonForModal?.teacher)" :key="comment.id">
                        <div class="bg-gray-50 rounded-lg p-3">
                          <p class="text-sm text-gray-800" x-text="comment.content"></p>
                          <p class="text-xs text-right font-bold text-green-600" x-text="`👍 ${comment.votes}`"></p>
                        </div>
                      </template>
                      <template x-if="getTopComments(selectedLessonForModal?.teacher).length === 0">
                        <p class="text-sm text-gray-500 text-center">Комментариев пока нет. Будьте первым!</p>
                      </template>
                    </div>
                  </div>

                  <a :href="`teacher-discussion.html?teacherName=${encodeURIComponent(selectedLessonForModal?.teacher)}`"
                    class="block w-full text-center bg-blue-500 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-600 transition-all duration-150 active:scale-95">
                    Перейти к обсуждению
                  </a>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>

  <footer class="fixed bottom-0 w-full bg-gray-50 border-t border-gray-200 py-1">
    <div class="max-w-screen-md mx-auto px-4 flex justify-center">
      <a href="/about.html" class="text-xs text-gray-600 hover:text-blue-600 hover:underline transition">
        О приложении
      </a>
    </div>
  </footer>
</body>

</html>
