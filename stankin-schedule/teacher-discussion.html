<!DOCTYPE html>
<html lang="ru" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Обсуждение преподавателя</title>
  <script type="module" src="/src/main.ts"></script>
  <script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>
</head>

<body class="h-full flex flex-col bg-gray-100 text-gray-800" x-data="teacherDiscussionApp" x-init="init()">
  <div class="flex-1 min-h-0 flex flex-col max-w-xl mx-auto w-full py-10 px-4 space-y-6">

    <template x-if="loading">
      <p class="text-center text-gray-500">⏳ Загрузка данных о преподавателе...</p>
    </template>
    <template x-if="error">
      <p class="text-center text-red-500" x-text="error"></p>
    </template>

    <template x-if="!loading && teacher">
      <div>
        <header class="text-center">
          <h1 class="text-3xl font-bold" x-text="teacher.name"></h1>
          <div class="flex items-center justify-center text-xl mt-2">
            <span class="text-yellow-500 mr-1">⭐</span>
            <span class="font-bold" x-text="teacher.averageRating"></span>
            <span class="text-gray-500 text-sm ml-2" x-text="`(${teacher.totalRatings} оценок)`"></span>
          </div>
        </header>

        <section class="bg-white rounded-2xl shadow p-4 sm:p-6 space-y-4 mt-6">
          <template x-if="!user.loggedIn">
            <div>
              <h2 class="text-xl font-semibold text-center mb-2">Присоединяйтесь к обсуждению!</h2>
              <p class="text-center text-gray-600 mb-4">Войдите, чтобы поставить оценку и оставить комментарий.</p>
              <button @click="login()"
                class="w-full flex items-center justify-center gap-2 bg-black text-white font-bold py-3 px-4 rounded-xl hover:bg-gray-800 transition-all duration-150 active:scale-95">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M9.505 5.263v13.474h2.105V9.47l5.263 9.263h2.632L12.579 5.263H9.505Z" fill="currentColor" />
                </svg>
                Войти через Яндекс
              </button>
            </div>
          </template>

          <template x-if="user.loggedIn">
            <div class="space-y-4">
              <div class="flex justify-between items-center">
                <h3 class="font-semibold">Ваше мнение:</h3>
                <button @click="logout()" class="text-sm text-red-500 hover:underline">Выйти</button>
              </div>
              <div>
                <h4 class="font-semibold mb-2 text-sm">Ваша оценка:</h4>
                <div class="flex items-center space-x-1">
                  <template x-for="star in 10" :key="star">
                    <button @click="rateTeacher(star)"
                      class="text-2xl transition-transform duration-150 hover:scale-125"
                      :class="user.ownRating >= star ? 'text-yellow-400' : 'text-gray-300'">★</button>
                  </template>
                </div>
              </div>
              <div>
                <h4 class="font-semibold mb-2 text-sm">Оставить комментарий 💬</h4>
                <textarea x-model="newCommentText" rows="3" placeholder="Поделитесь своим мнением..."
                  class="w-full border-gray-300 rounded-xl p-2 focus:ring-2 focus:ring-blue-400"></textarea>
                <button @click="addComment()" :disabled="!newCommentText.trim()"
                  class="mt-2 bg-blue-500 text-white font-semibold py-2 px-4 rounded-xl hover:bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed">Отправить</button>
              </div>
            </div>
          </template>
        </section>

        <section class="space-y-4 mt-6">
          <h2 class="text-xl font-semibold">Комментарии</h2>
          <template x-for="comment in sortedComments" :key="comment.id">
            <div class="bg-white rounded-2xl shadow p-4">
              <div class="flex items-start gap-3">
                <div class="flex flex-col items-center">
                  <button @click="voteComment(comment.id, 1)" class="text-gray-400 hover:text-green-500">▲</button>
                  <span class="font-bold text-sm" x-text="comment.votes"
                    :class="{'text-green-600': comment.votes > 0, 'text-red-600': comment.votes < 0}"></span>
                  <button @click="voteComment(comment.id, -1)" class="text-gray-400 hover:text-red-500">▼</button>
                </div>
                <div class="flex-1">
                  <p class="font-semibold" x-text="comment.anonymous ? 'Аноним' : comment.user.firstName"></p>
                  <p class="text-gray-800" x-text="comment.content"></p>
                  <div class="text-xs text-gray-500 mt-1">
                    <span x-text="new Date(comment.createdAt).toLocaleDateString('ru-RU')"></span>
                  </div>
                </div>
              </div>
            </div>
          </template>
          <template x-if="comments.length === 0">
            <p class="text-center text-gray-500 pt-4">Комментариев пока нет. Будьте первым!</p>
          </template>
        </section>
      </div>
    </template>
  </div>
  <footer class="text-center text-sm text-gray-500 py-1">
    <a href="/index.html" class="text-xs text-gray-600 hover:text-blue-600 hover:underline transition">
      ← Назад к расписанию
    </a>
  </footer>
</body>

</html>
