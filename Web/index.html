<!DOCTYPE html>
<html lang="ru" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание</title>
    <link rel="manifest" href="public/manifest.json">
    <meta name="theme-color" content="#4A90E2">
    <link rel="apple-touch-icon" href="apple-touch-icon.jpg" />
    <link rel="apple-touch-icon-precomposed" href="apple-touch-icon.jpg" />

    <script type="module" src="src/main.js"></script>
</head>

<body class="h-full flex flex-col bg-gray-100 text-gray-800" x-data="scheduleApp" x-init="init()">
    <div class="flex-1 min-h-0 flex flex-col max-w-xl mx-auto w-full py-10 px-4">
        <template x-if="!selectedGroup">
            <div>
                <h1 class="text-2xl font-bold mb-4">выбери группу</h1>
                <template x-if="groups.length === 0">
                    <p>загрузка групп...</p>
                </template>
                <template x-if="groups.length > 0">
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                        <template x-for="group in groups" :key="group">
                            <button @click="selectGroup(group)"
                                class="bg-white shadow hover:shadow-lg rounded-xl p-4 text-center text-sm font-medium transition-all duration-150 hover:bg-blue-50 active:scale-95">
                                <span x-text="group"></span>
                            </button>
                        </template>
                    </div>
                </template>
            </div>
        </template>
        <template x-if="selectedGroup">
            <div class="flex flex-col min-h-0 flex-1">
                <h1 class="text-xl font-semibold mb-2">группа: <span x-text="selectedGroup"></span>
                <button class="mb-4 text-sm text-blue-500 underline" @click="reset()">сменить группу</button>
                </h1>

                <div x-data="scheduleComponent(selectedGroup)" x-init="init()" class="flex flex-col min-h-0 flex-1">
                    <div class="flex items-center justify-between mb-4">
                        <div class="swiper w-full" x-ref="swiper">
                            <div class="swiper-wrapper">
                                <template x-for="(range, index) in dateRanges" :key="index">
                                    <div class="swiper-slide">
                                        <div class="flex space-x-2 justify-center">
                                            <template x-for="date in range" :key="date">
                                                <button @click="onDateClick(date)"
                                                    class="min-w-[40px] py-2 rounded shadow text-sm"
                                                    :class="isSelectedDate(date) ? 'bg-blue-100' : 'bg-white hover:bg-blue-50'"
                                                    :disabled="!hasSchedule(date) && loading">
                                                    <span x-text="formatDateShort(date)"></span>
                                                </button>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    <div x-ref="scheduleContainer" class="flex-1 min-h-0 overflow-y-auto">
                        <div x-show="loading && loadingDir==='top'" class="text-gray-600 text-center py-2">загрузка
                            расписания...</div>
                        <div x-ref="loadMoreTop"></div>
                        <template x-if="!loading && isEmptySchedule && !error">
                            <p class="text-center">расписание не найдено.</p>
                        </template>
                        <template x-if="error">
                            <p class="text-red-500 text-center" x-text="error"></p>
                        </template>
                        <template x-for="entry in Object.entries(groupedSchedule)" :key="entry[0]">
                            <div :id="'date-' + entry[0]" class="mb-6">
                                <h2 class="text-lg font-semibold mb-2" x-text="formatDate(entry[0])"></h2>

                                <div class="space-y-4">
                                    <template x-for="lesson in entry[1]" :key="lessonKey(entry[0], lesson)">
                                        <!-- Карточка -->
                                        <div class="group relative rounded-2xl bg-white shadow-sm ring-1 ring-gray-200 p-4 hover:shadow-md focus-within:ring-2 focus-within:ring-blue-400 transition"
                                            :aria-label="`Занятие: ${lesson.subject}`">
                                            <!-- 1. Предмет + время -->
                                            <div class="flex items-start justify-between gap-3">
                                                <h3 class="text-lg sm:text-xl font-semibold tracking-tight leading-snug"
                                                    x-text="lesson.subject"></h3>
                                                <div class="shrink-0 text-right">
                                                    <div class="text-sm font-mono tabular-nums"
                                                        x-text="formatTime(lesson.startTime) + '–' + formatTime(calculateEndTime(lesson.startTime, lesson.duration))">
                                                    </div>
                                                </div>
                                            </div>


                                            <!-- Тип + кабинет + порядковый номер -->
                                            <div class="mt-2 flex flex-wrap items-center gap-2 text-sm">
                                                <span
                                                    class="inline-block rounded-md bg-gray-50 ring-1 ring-gray-200 px-2 py-1 text-sm font-medium"
                                                    x-text="formatCabinet(lesson.cabinet)"></span>
                                                <span
                                                    class="inline-flex items-center rounded-full px-2 py-1 ring-1 font-medium"
                                                    :class="typeBadgeClass(lesson.type)" x-text="lesson.type"></span>
                                                <span class="text-gray-600"
                                                    x-text="formatSequence(lesson.sequencePosition, lesson.sequenceLength, lesson.type)"></span>
                                            </div>

                                            <!-- Подгруппа -->
                                            <div class="mt-2">
                                                <template x-if="lesson.subgroup">
                                                    <span class="text-gray-500">· подгруппа: <span
                                                            x-text="lesson.subgroup"></span></span>
                                                </template>
                                            </div>

                                            <!-- 4. Преподаватель -->
                                            <div class="mt-2 text-sm text-gray-800">
                                                <span x-text="lesson.teacher || 'преподаватель не указан'"></span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <div x-ref="loadMoreBottom"></div>
                        <div x-show="loading && loadingDir==='bottom'" class="text-gray-600 text-center py-2">загрузка
                            расписания...</div>
                    </div>
                </div>
            </div>
        </template>
    </div>
    <footer class="sticky bottom-0 bg-gray-200 text-center py-1 text-xs text-gray-600">
        Отказ от ответственности: Информация предоставлена в ознакомительных целях и может быть неточной.
    </footer>
</body>

</html>
